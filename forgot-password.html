<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>استرجاع كلمة المرور | نواة</title><link rel="stylesheet" href="styles.css"><link rel="icon" type="image/png" href="nawa-logo.png">
</head>
<body><main class="local-reset-page"><section class="local-reset-card">
<a class="brand reset-brand" href="index.html"><img class="brand-logo" src="nawa-logo.png" alt="شعار نواة"><span class="brand-name">نواة</span></a>
<h1>استرجاع كلمة المرور</h1><p>اكتب بريدك الإلكتروني وسيتم إرسال رابط آمن لتعيين كلمة مرور جديدة.</p>
<div id="forgot-message" class="local-reset-message" hidden></div>
<form id="forgot-password-form" class="auth-form" autocomplete="on">
<label>البريد الإلكتروني<input type="email" name="email" autocomplete="email" placeholder="name@email.com" required></label>
<button class="button primary auth-submit" type="submit">إرسال رابط الاسترجاع</button>
</form><p class="auth-switch"><a href="login.html">العودة لتسجيل الدخول</a></p>
</section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="security.js"></script>
<script src="forgot-password.js"></script>
</body></html>
