<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>تعيين كلمة مرور جديدة | نواة</title><link rel="stylesheet" href="styles.css"><link rel="icon" type="image/png" href="nawa-logo.png">
</head>
<body><main class="local-reset-page"><section class="local-reset-card">
<a class="brand reset-brand" href="index.html"><img class="brand-logo" src="nawa-logo.png" alt="شعار نواة"><span class="brand-name">نواة</span></a>
<h1>تعيين كلمة مرور جديدة</h1><p>اكتب كلمة المرور الجديدة بعد فتح رابط الاسترجاع من البريد.</p>
<div id="reset-message" class="local-reset-message" hidden></div>
<form id="reset-password-form" class="auth-form" autocomplete="on">
<label>كلمة المرور الجديدة<input type="password" name="password" minlength="8" autocomplete="new-password" required></label>
<label>تأكيد كلمة المرور<input type="password" name="confirmPassword" minlength="8" autocomplete="new-password" required></label>
<button class="button primary auth-submit" type="submit">تحديث كلمة المرور</button>
</form><p class="auth-switch"><a href="login.html">العودة لتسجيل الدخول</a></p>
</section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="security.js"></script>
<script src="reset-password.js?v=20260517-recovery"></script>
</body></html>
